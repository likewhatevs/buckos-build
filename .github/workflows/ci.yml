name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  test-setup:
    name: "Test setup.sh (${{ matrix.distro }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu:24.04
          - distro: fedora:42
          - distro: archlinux:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test setup.sh in Docker
        run: |
          docker run --rm -v "$PWD:/src:ro" -w /tmp/test "${{ matrix.distro }}" \
            bash -c '
              cp -r /src/. . &&
              bash setup.sh --yes &&
              export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH" &&
              gcc --version &&
              buck2 --version &&
              cargo --version &&
              uv --version &&
              rg --version &&
              fd --version || fdfind --version
            '

  build:
    name: build seed
    runs-on: [self-hosted, large]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
      - name: Install buck2
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/facebook/buck2/releases/download/2026-02-01/buck2-x86_64-unknown-linux-gnu.zst \
            | zstd -d -f -o "$HOME/.local/bin/buck2"
          chmod +x "$HOME/.local/bin/buck2"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Restart buck2 daemon
        run: buck2 kill 2>/dev/null || true
      - name: Resolve targets
        run: buck2 targets //...
      - name: Graph tests
        run: |
          failed=0
          for bxl in tests/graph/test_*.bxl; do
            name=$(basename "$bxl" .bxl)
            echo "::group::$name"
            buck2 bxl "//tests/graph/${name}.bxl:${name}" || failed=1
            echo "::endgroup::"
          done
          [ "$failed" -eq 0 ]
      - name: Build seed toolchain
        run: buck2 build //tc/bootstrap:seed-export --out seed-toolchain.tar.zst
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: seed-toolchain
          path: seed-toolchain.tar.zst
          compression-level: 0

  test:
    name: test
    needs: [build]
    runs-on: [self-hosted, large]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
      - name: Install buck2
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/facebook/buck2/releases/download/2026-02-01/buck2-x86_64-unknown-linux-gnu.zst \
            | zstd -d -f -o "$HOME/.local/bin/buck2"
          chmod +x "$HOME/.local/bin/buck2"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Unit tests
        run: "buck2 test //tests:"
      - name: Build minimal ISO
        run: buck2 build //packages/linux/system:buckos-minimal-iso --out buckos-minimal.iso
      - name: Build KDE ISO
        run: buck2 build //packages/linux/system:buckos-live-installer-kde --out buckos-kde.iso
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: buckos-minimal-iso
          path: buckos-minimal.iso
          compression-level: 0
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: buckos-kde-iso
          path: buckos-kde.iso
          compression-level: 0

  test-aarch64:
    name: build & test (aarch64)
    runs-on: [self-hosted, ARM64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
      - name: Apply local config
        run: cp /opt/gha/.buckconfig.local .buckconfig.local
      - name: Install buck2
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/facebook/buck2/releases/download/2026-02-01/buck2-aarch64-unknown-linux-gnu.zst \
            | zstd -d -f -o "$HOME/.local/bin/buck2"
          chmod +x "$HOME/.local/bin/buck2"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Restart buck2 daemon
        run: buck2 kill 2>/dev/null || true
      - name: Resolve targets
        run: buck2 targets //...
      - name: Graph tests
        run: |
          failed=0
          for bxl in tests/graph/test_*.bxl; do
            name=$(basename "$bxl" .bxl)
            echo "::group::$name"
            buck2 bxl "//tests/graph/${name}.bxl:${name}" || failed=1
            echo "::endgroup::"
          done
          [ "$failed" -eq 0 ]
      - name: Tests
        run: "buck2 test //tests:"

  test-seed:
    name: test with seed
    needs: [build]
    runs-on: [self-hosted, mini]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: seed-toolchain
          path: .
      - name: Install buck2
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/facebook/buck2/releases/download/2026-02-01/buck2-x86_64-unknown-linux-gnu.zst \
            | zstd -d -f -o "$HOME/.local/bin/buck2"
          chmod +x "$HOME/.local/bin/buck2"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Configure seed
        run: printf '[buckos]\nseed_path = seed-toolchain.tar.zst\n' >> .buckconfig.local
      - name: Verify seed archive
        run: |
          echo "Archive size: $(stat -c%s seed-toolchain.tar.zst) bytes"
          zstd -dc seed-toolchain.tar.zst | tar tf - | head -20
          zstd -dc seed-toolchain.tar.zst | tar tf - | grep -c host-tools || echo "WARNING: no host-tools in archive"
      - name: Tests
        run: |
          targets=$(buck2 uquery 'kind(sh_test, //tests:) - set(//tests:test-seed-isolation //tests:test-kde-iso-boot) - attrfilter(labels, heavy, kind(sh_test, //tests:))' 2>/dev/null)
          buck2 test $targets

  required-checks:
    name: required checks
    needs: [test-setup, build, test, test-aarch64, test-seed]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          results=(
            "${{ needs.test-setup.result }}"
            "${{ needs.build.result }}"
            "${{ needs.test.result }}"
            "${{ needs.test-aarch64.result }}"
            "${{ needs.test-seed.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::One or more required jobs failed or were cancelled"
              exit 1
            fi
          done

  release:
    needs: [required-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          make_latest: false
          files: |
            seed-toolchain/seed-toolchain.tar.zst
            buckos-minimal-iso/buckos-minimal.iso
            # buckos-kde-iso/buckos-kde.iso  # ~12 GiB; GitHub release assets max is 2 GiB
